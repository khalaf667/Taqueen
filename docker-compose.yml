version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: taqueen_db
    environment:
      POSTGRES_DB: taqueen_db
      POSTGRES_USER: taqueen_user
      POSTGRES_PASSWORD: taqueen_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taqueen_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taqueen_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: taqueen_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taqueen_network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taqueen_backend
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taqueen_db
      DB_USER: taqueen_user
      DB_PASSWORD: taqueen_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      SOCKET_CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/logs:/app/logs
    networks:
      - taqueen_network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taqueen_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - taqueen_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taqueen_network:
    driver: bridge
